    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getFirestore, doc, getDoc, updateDoc, increment } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';
        import { getAuth, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';

        const firebaseConfig = {
            apiKey: "AIzaSyCq2cyJUMIA9pGWz9PZ8VPdw1hi0-iv3cU",
            authDomain: "crux-faith-formation.firebaseapp.com",
            projectId: "crux-faith-formation",
            storageBucket: "crux-faith-formation.firebasestorage.app",
            messagingSenderId: "838141015985",
            appId: "1:838141015985:web:2655e570663e182d75ef90"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        window.db = db;
        window.fbDoc = doc;
        window.fbUpdateDoc = updateDoc;
        window.fbIncrement = increment;

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                window.currentUid = user.uid;
                const [teacherSnap, progressSnap] = await Promise.all([
                    getDoc(doc(db, 'teachers', user.uid)),
                    getDoc(doc(db, 'userProgress', user.uid))
                ]);
                const isTeacher = teacherSnap.exists();
                const alreadyClaimed = !!(progressSnap.exists() && progressSnap.data()?.completedModules?.vaticanII);
                if (typeof window.onAuthResolved === 'function') {
                    window.onAuthResolved(user.uid, isTeacher, alreadyClaimed);
                }
            } else {
                window.currentUid = null;
                if (typeof window.onAuthResolved === 'function') {
                    window.onAuthResolved(null, false, false);
                }
            }
        });
    </script>

            <span class="belief-tag">Church History &middot; Council</span>
            <h1>Vatican II</h1>
            <p class="belief-subtitle">Vatican II wasn't a break from tradition. It was the Church returning to its deepest roots &mdash; and the clearest modern proof that the same Church the Apostles built is still here today.</p>
        </div>

        <div class="view-toggle" id="vatToggle" style="display:none">
            <button class="toggle-btn active" id="tbStudent" onclick="setVatView('student')">&#10022; Student View</button>
            <button class="toggle-btn" id="tbTeacher" onclick="setVatView('teacher')">&#127891; Teacher Hub</button>
        </div>

        <div id="vatContent"></div>
    </section>

    <footer class="related-footer">
        <div class="related-label">Explore More Core Beliefs</div>
        <a href="index.html#beliefs" class="related-link">&#8592; Back to All Beliefs</a>
    </footer>
</main>

<script>
    // ── State ──
    let vatView = 'student';
    let docTab = 0;
    let step = 0;
    let flippedCard = null;
    let xpClaimed = false;

    // ── Data ──
    const teacherDocs = [
        {
            abbr: 'SC',
            title: 'Sacrosanctum Concilium',
            subtitle: 'Constitution on the Sacred Liturgy',
            tag: 'Liturgy',
            color: '#7c4a2d',
            classroomUse: 'Use when teaching the Mass, sacraments, or worship practices.',
            keyIdea: 'Active, conscious participation of all the faithful in liturgy is the primary goal of reform.',
            studentQ: 'Why do we say Mass in English?',
            answer: "Because Vatican II restored the early Church’s practice of worshipping in the language of the people — just as the first Christians did."
        },
        {
            abbr: 'LG',
            title: 'Lumen Gentium',
            subtitle: 'Dogmatic Constitution on the Church',
            tag: 'Ecclesiology',
            color: '#1a4a6b',
            classroomUse: 'Use when teaching the role of laity, bishops, or the nature of the Church.',
            keyIdea: 'The Church is the whole People of God — not just clergy — each called to holiness and mission.',
            studentQ: 'Is being Catholic just about going to Mass?',
            answer: "No — Vatican II reminded us that every baptized person shares in Christ’s priestly, prophetic, and kingly mission."
        },
        {
            abbr: 'GS',
            title: 'Gaudium et Spes',
            subtitle: 'Pastoral Constitution on the Church in the Modern World',
            tag: 'Social Teaching',
            color: '#2d6b3a',
            classroomUse: "Use when teaching human dignity, justice, or the Church’s role in society.",
            keyIdea: "The Church reads the ‘signs of the times’ and engages the world rather than retreating from it.",
            studentQ: 'Does the Church care about things happening in the world?',
            answer: "Deeply. Vatican II declared that the joys and hopes of humanity are the joys and hopes of the Church."
        },
        {
            abbr: 'DV',
            title: 'Dei Verbum',
            subtitle: 'Dogmatic Constitution on Divine Revelation',
            tag: 'Scripture & Tradition',
            color: '#5c3a6b',
            classroomUse: 'Use when teaching Scripture, Tradition, or how we know what God has revealed.',
            keyIdea: 'Scripture and Tradition together form one sacred deposit of the Word of God entrusted to the Church.',
            studentQ: 'Why do Catholics use Tradition AND the Bible?',
            answer: "Because that’s how the Apostles handed on the faith — through living witness and written word together."
        }
    ];

    const timelineItems = [
        { year: '~AD 50',     label: 'The Early Church',       detail: 'Worship in vernacular languages, communal Eucharist, active participation of all baptized.', hl: false },
        { year: 'AD 325',     label: 'Council of Nicaea',      detail: 'Bishops gather to define the nature of Christ. The conciliar tradition begins.', hl: false },
        { year: 'AD 400s',    label: 'Latin Becomes Dominant', detail: 'As the Roman Empire spreads Christianity, Latin becomes the liturgical language of the West.', hl: false },
        { year: 'AD 1054',    label: 'Great Schism',           detail: 'East and West divide. The Church reflects on unity and authority.', hl: false },
        { year: 'AD 1545',    label: 'Council of Trent',       detail: 'Response to the Reformation. Clarifies doctrine, standardizes the Latin Mass.', hl: false },
        { year: '1962–1965', label: 'Vatican II',         detail: 'Returns to the sources. Restores active participation, vernacular Mass — echoing the early Church.', hl: true },
        { year: 'Today',      label: 'Same Church',            detail: 'The Eucharist, apostolic succession, Scripture and Tradition — unchanged since the Apostles.', hl: false }
    ];

    const constitutionCards = [
        { title: 'Sacrosanctum Concilium', abbr: 'SC', rarity: 'Rare',      color: '#7c4a2d', symbol: '🕊' },
        { title: 'Lumen Gentium',          abbr: 'LG', rarity: 'Epic',      color: '#1a4a6b', symbol: '⛪' },
        { title: 'Dei Verbum',             abbr: 'DV', rarity: 'Rare',      color: '#5c3a6b', symbol: '📖' },
        { title: 'Gaudium et Spes',        abbr: 'GS', rarity: 'Legendary', color: '#2d6b3a', symbol: '🌍' }
    ];

    // ── Global handlers ──
    window.setVatView = function(v) {
        vatView = v;
        document.getElementById('tbStudent').classList.toggle('active', v === 'student');
        document.getElementById('tbTeacher').classList.toggle('active', v === 'teacher');
        renderContent();
    };

    window.setDocTab = function(i) {
        docTab = i;
        renderContent();
    };

    window.setStep = function(n) {
        if (n < 0 || n > 3) return;
        step = n;
        flippedCard = null;
        renderContent();
    };

    window.toggleCard = function(i) {
        flippedCard = flippedCard === i ? null : i;
        renderContent();
    };

    window.claimXP = async function() {
        if (xpClaimed) return;
        if (!window.currentUid) {
            alert('Sign in to claim XP.');
            return;
        }
        try {
            await window.fbUpdateDoc(window.fbDoc(window.db, 'userProgress', window.currentUid), {
                xp: window.fbIncrement(150),
                'unlockedPacks.councilPack': true,
                'completedModules.vaticanII': true
            });
            xpClaimed = true;
            renderContent();
        } catch (e) {
            console.error('XP claim failed:', e);
        }
    };

    window.onAuthResolved = function(uid, isTeacher, alreadyClaimed) {
        xpClaimed = alreadyClaimed;
        if (isTeacher) {
            document.getElementById('vatToggle').style.display = 'flex';
        }
        renderContent();
    };

    // ── Render ──
    function renderContent() {
        document.getElementById('vatContent').innerHTML =
            vatView === 'teacher' ? renderTeacherHub() : renderStudentModule();
    }

    function renderTeacherHub() {
        const d = teacherDocs[docTab];
        const tabs = teacherDocs.map((t, i) => {
            const active = i === docTab;
            const bg = active ? 'background:' + t.color + ';' : '';
            const abbrColor = active ? 'color:#fff;' : '';
            const tagColor = active ? 'color:#C9A84C;' : '';
            return '<button class="doc-tab" style="' + bg + '" onclick="setDocTab(' + i + ')">' +
                '<span class="tab-abbr" style="' + abbrColor + '">' + t.abbr + '</span>' +
                '<span class="tab-tag" style="' + tagColor + '">' + t.tag + '</span>' +
                '</button>';
        }).join('');

        return '<div class="hub-shell">' +
            '<div class="hub-header">' +
                '<span class="resource-badge">Teacher Resource</span>' +
                '<h2 class="hub-title">Teaching Vatican II</h2>' +
                '<p class="hub-subtitle">Confidence, context, and classroom tools for educators</p>' +
            '</div>' +
            '<div class="hub-intro-strip">' +
                '<span style="font-size:1.2rem;flex-shrink:0">📋</span>' +
                '<p>Each of the four Constitutions is a cornerstone of Vatican II. Select one below to see its classroom application, key teaching idea, and how to answer common student questions faithfully.</p>' +
            '</div>' +
            '<div class="doc-tabs">' + tabs + '</div>' +
            '<div class="doc-detail">' +
                '<div class="doc-title-row">' +
                    '<div class="doc-color-bar" style="background:' + d.color + '"></div>' +
                    '<div class="doc-title-text">' +
                        '<div class="doc-name" style="color:' + d.color + '">' + d.title + '</div>' +
                        '<p class="doc-subtitle-text">' + d.subtitle + '</p>' +
                    '</div>' +
                    '<span class="doc-badge" style="background:' + d.color + '22;color:' + d.color + ';border-color:' + d.color + '55">' + d.tag + '</span>' +
                '</div>' +
                '<div class="key-idea-box" style="background:' + d.color + '0d;border-color:' + d.color + '33;border-left-color:' + d.color + '">' +
                    '<div class="box-label" style="color:' + d.color + '">Core Teaching Idea</div>' +
                    '<p class="key-idea-text">“' + d.keyIdea + '”</p>' +
                '</div>' +
                '<div class="classroom-box">' +
                    '<div class="box-label gold-label">📚 When to Use in the Classroom</div>' +
                    '<p class="classroom-text">' + d.classroomUse + '</p>' +
                '</div>' +
                '<div class="qa-box">' +
                    '<div class="box-label gold-label">💬 Common Student Question</div>' +
                    '<div class="student-q">“' + d.studentQ + '”</div>' +
                    '<div class="box-label gold-label" style="margin-top:0.75rem">Faithful Answer</div>' +
                    '<p class="faithful-answer">' + d.answer + '</p>' +
                '</div>' +
            '</div>' +
            '<div class="hub-footer">' +
                '<span class="hub-footer-note">Available in Teacher Dashboard → Vatican II Resources</span>' +
                // TODO: replace # with real PDF path when created
                '<a href="#" class="btn-outline" target="_blank">Download Discussion Guide →</a>' +
            '</div>' +
        '</div>';
    }

    function renderStudentModule() {
        const stepLabels = ['The Early Church', 'What Never Changes', 'Vatican II', 'Collect the Cards'];
        const pills = stepLabels.map((s, i) => {
            const cls = i === step ? 'step-pill active' : i < step ? 'step-pill done' : 'step-pill';
            return '<button class="' + cls + '" onclick="setStep(' + i + ')">' + (i + 1) + '. ' + s + '</button>';
        }).join('');

        const dots = [0,1,2,3].map(i =>
            '<div class="nav-dot' + (i === step ? ' active' : '') + '"></div>'
        ).join('');

        let content = '';
        if (step === 0) content = renderStep0();
        else if (step === 1) content = renderStep1();
        else if (step === 2) content = renderStep2();
        else content = renderStep3();

        return '<div class="module-shell">' +
            '<div class="module-hero">' +
                '<div class="hero-ring" style="width:200px;height:200px;bottom:-100px;right:-100px;opacity:.08"></div>' +
                '<div class="hero-ring" style="width:140px;height:140px;bottom:-70px;right:-70px;opacity:.14"></div>' +
                '<div class="hero-ring" style="width:90px;height:90px;bottom:-45px;right:-45px;opacity:.22"></div>' +
                '<div class="hero-label">Student Module · Church History</div>' +
                '<h2 class="hero-title">Same Church,<br>Every Century</h2>' +
                '<p class="hero-desc">How Vatican II shows the Church returning to its roots — not abandoning them.</p>' +
                '<div class="step-pills">' + pills + '</div>' +
            '</div>' +
            '<div class="step-content">' + content + '</div>' +
            '<div class="step-nav">' +
                '<button class="nav-btn" onclick="setStep(' + (step - 1) + ')"' + (step === 0 ? ' disabled' : '') + '>← Previous</button>' +
                '<div class="nav-dots">' + dots + '</div>' +
                '<button class="nav-btn next" onclick="setStep(' + (step + 1) + ')"' + (step === 3 ? ' disabled' : '') + '>Next →</button>' +
            '</div>' +
        '</div>';
    }

    function renderStep0() {
        const items = [
            { icon: '🗣', title: 'Vernacular Worship',    text: 'Early Christians prayed and celebrated the Eucharist in Greek and Aramaic — the languages of the people.' },
            { icon: '🍞', title: 'The Breaking of Bread', text: 'Every Sunday, communities gathered for the Eucharist. It was central, communal, and participatory.' },
            { icon: '✉️', title: 'Letters & Tradition',   text: "Paul’s letters and oral tradition passed on the faith together — long before the New Testament canon was settled." },
            { icon: '⛪',       title: 'Apostolic Leadership',  text: 'Bishops traced their authority directly to the Apostles. That chain has never broken.' }
        ];
        const cards = items.map(item =>
            '<div class="parchment-card">' +
                '<div class="parchment-icon">' + item.icon + '</div>' +
                '<div class="parchment-title">' + item.title + '</div>' +
                '<p class="parchment-text">' + item.text + '</p>' +
            '</div>'
        ).join('');
        return '<div class="step-panel">' +
            '<h3 class="step-heading">What Did the Early Church Look Like?</h3>' +
            '<p class="step-ref">Acts of the Apostles · 1st–3rd Century</p>' +
            '<div class="card-grid">' + cards + '</div>' +
            '<div class="callout-navy">' +
                '<span class="callout-icon">💡</span>' +
                '<p><strong class="gold-text">Remember:</strong> The Church you walk into on Sunday is the same Church these early Christians built. The faces change. The faith doesn’t.</p>' +
            '</div>' +
        '</div>';
    }

    function renderStep1() {
        const items = [
            { anchor: 'The Eucharist',         desc: 'Jesus said “Do this in memory of me.” Every Mass since has been that same act — same sacrifice, same Real Presence.', ref: 'Luke 22:19' },
            { anchor: 'Apostolic Succession',  desc: 'Bishops today can trace an unbroken line of ordination back to the Apostles themselves.', ref: 'Acts 1:20–26' },
            { anchor: 'Scripture & Tradition', desc: 'The Church has always held both as the single source of divine revelation — never Scripture alone.', ref: '2 Thess 2:15' },
            { anchor: 'The Creed',             desc: 'The Nicene Creed (AD 325) is still prayed every Sunday. Word for word. Century to century.', ref: 'Council of Nicaea' }
        ];
        const rows = items.map((item, i) =>
            '<div class="unchanged-item">' +
                '<div class="unchanged-num">' + (i + 1) + '</div>' +
                '<div class="unchanged-body">' +
                    '<div class="unchanged-title">' + item.anchor + '</div>' +
                    '<p class="unchanged-desc">' + item.desc + '</p>' +
                    '<span class="ref-badge">' + item.ref + '</span>' +
                '</div>' +
            '</div>'
        ).join('');
        return '<div class="step-panel">' +
            '<h3 class="step-heading">What Has Never Changed?</h3>' +
            '<div class="unchanged-list">' + rows + '</div>' +
        '</div>';
    }

    function renderStep2() {
        const tl = timelineItems.map(item =>
            '<div class="timeline-item">' +
                '<div class="timeline-dot' + (item.hl ? ' hl' : '') + '"></div>' +
                '<div class="timeline-card' + (item.hl ? ' hl' : '') + '">' +
                    '<div class="timeline-meta">' +
                        '<span class="tl-year' + (item.hl ? ' gold' : '') + '">' + item.year + '</span>' +
                        '<span class="tl-label">' + item.label + '</span>' +
                        (item.hl ? '<span class="tl-badge">Vatican II</span>' : '') +
                    '</div>' +
                    '<p class="tl-detail">' + item.detail + '</p>' +
                '</div>' +
            '</div>'
        ).join('');
        return '<div class="step-panel">' +
            '<h3 class="step-heading">What Vatican II Actually Did</h3>' +
            '<p class="step-ref">Reform that echoes the early Church — not abandons it</p>' +
            '<div class="timeline"><div class="timeline-line"></div>' + tl + '</div>' +
            '<div class="callout-navy">' +
                '<p><span class="gold-text" style="font-weight:700">The punchline:</span> When Vatican II restored the vernacular Mass and active participation, it wasn’t inventing something new. It was <em>returning to something ancient.</em> The early Christians would have recognized it immediately.</p>' +
            '</div>' +
        '</div>';
    }

    function renderStep3() {
        const cards = constitutionCards.map((card, i) => {
            const flipped = flippedCard === i;
            const borderColor = flipped ? '#C9A84C' : card.color + '55';
            const shadow = flipped ? '0 4px 20px rgba(201,168,76,0.27)' : '0 2px 8px rgba(0,0,0,0.08)';
            return '<div class="const-card" onclick="toggleCard(' + i + ')" style="border-color:' + borderColor + ';box-shadow:' + shadow + '">' +
                '<div class="card-front" style="display:' + (flipped ? 'none' : 'block') + ';background:linear-gradient(135deg,' + card.color + ' 0%,' + card.color + 'cc 100%)">' +
                    '<div class="card-symbol">' + card.symbol + '</div>' +
                    '<div class="card-abbr">' + card.abbr + '</div>' +
                    '<div class="card-rarity">' + card.rarity + '</div>' +
                '</div>' +
                '<div class="card-back" style="display:' + (flipped ? 'block' : 'none') + '">' +
                    '<div class="card-back-tag" style="color:' + card.color + '">Vatican II · Constitution</div>' +
                    '<div class="card-back-title">' + card.title + '</div>' +
                    '<div class="card-back-rarity" style="color:#C9A84C">❖ ' + card.rarity + '</div>' +
                '</div>' +
            '</div>';
        }).join('');

        const claimBtn = xpClaimed
            ? '<button class="claim-btn" disabled>✓ XP Claimed</button>'
            : '<button class="claim-btn" onclick="claimXP()">Claim XP →</button>';

        return '<div class="step-panel">' +
            '<h3 class="step-heading">Collect the Four Constitutions</h3>' +
            '<p class="step-ref">Tap a card to learn what it teaches</p>' +
            '<div class="card-grid">' + cards + '</div>' +
            '<div class="xp-bar">' +
                '<div>' +
                    '<div class="xp-label">Module Complete</div>' +
                    '<p class="xp-desc">Earn +150 XP · Unlock the Council Pack</p>' +
                '</div>' +
                claimBtn +
            '</div>' +
        '</div>';
    }

    // Initial render before auth resolves
    renderContent();
</script>

</body>
</html>
