<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRUX Pack Mockup 2 — Sacred Unboxing</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Cinzel:wght@400;600;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: #080b16;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'DM Mono', monospace;
  overflow: hidden;
}

/* ── BACKGROUND GRAIN ── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 0;
}

/* ── PACK SCREEN ── */
.pack-screen {
  position: fixed;
  inset: 0;
  z-index: 10;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 2.5rem;
  transition: opacity 0.4s ease;
}

.pack-eyebrow {
  font-size: 0.56rem;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: rgba(212,165,116,0.45);
}

/* Wax seal pack */
.pack-container {
  position: relative;
  width: 220px;
  cursor: pointer;
}

.pack-body {
  width: 220px;
  height: 300px;
  border-radius: 12px;
  background: linear-gradient(160deg, #1c2140 0%, #141830 60%, #1c2140 100%);
  border: 1px solid rgba(212,165,116,0.2);
  position: relative;
  overflow: visible;
  box-shadow: 0 24px 80px rgba(0,0,0,0.8), 0 0 60px rgba(212,165,116,0.06);
  transition: transform 0.4s ease;
}
.pack-body:hover {
  transform: scale(1.03) translateY(-4px);
}

/* Decorative pack content */
.pack-inner-bg {
  position: absolute;
  inset: 8px;
  border-radius: 8px;
  border: 1px solid rgba(212,165,116,0.08);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 0.5rem;
}
.pack-inner-cross {
  font-size: 3rem;
  opacity: 0.12;
  line-height: 1;
}
.pack-wordmark {
  font-family: 'Playfair Display', serif;
  font-weight: 900;
  font-size: 2rem;
  letter-spacing: 8px;
  background: linear-gradient(135deg, #d4a574, #f0c878, #d4a574);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  opacity: 0.5;
}
.pack-line {
  width: 60px;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(212,165,116,0.3), transparent);
}
.pack-sub-text {
  font-size: 0.36rem;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: rgba(212,165,116,0.3);
}

/* Wax seal on top of pack */
.wax-seal {
  position: absolute;
  top: -24px;
  left: 50%;
  transform: translateX(-50%);
  width: 56px;
  height: 56px;
  border-radius: 50%;
  background: radial-gradient(ellipse at 35% 35%, #c0392b 0%, #8b1a1a 50%, #6b0f0f 100%);
  border: 2px solid rgba(212,165,116,0.25);
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 4px 20px rgba(0,0,0,0.6), 0 0 20px rgba(192,57,43,0.3);
  z-index: 5;
  cursor: pointer;
  transition: transform 0.2s ease, box-shadow 0.2s ease;
}
.wax-seal:hover {
  transform: translateX(-50%) scale(1.08);
  box-shadow: 0 4px 30px rgba(0,0,0,0.7), 0 0 30px rgba(192,57,43,0.5);
}
.wax-seal-cross {
  font-family: 'Cinzel', serif;
  font-size: 1.1rem;
  color: rgba(255,220,200,0.7);
  user-select: none;
}

.pack-cta {
  font-size: 0.54rem;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: rgba(212,165,116,0.5);
  animation: fade-pulse 2s ease-in-out infinite;
}
@keyframes fade-pulse {
  0%, 100% { opacity: 0.4; }
  50%       { opacity: 0.9; }
}

/* ── SEAL CRACK ANIMATION ── */
@keyframes seal-crack {
  0%   { transform: translateX(-50%) scale(1) rotate(0deg); }
  20%  { transform: translateX(-50%) scale(1.15) rotate(-5deg); }
  40%  { transform: translateX(-50%) scale(1.1) rotate(5deg); }
  60%  { transform: translateX(-50%) scale(0.9) rotate(-2deg); }
  80%  { transform: translateX(-50%) scale(1.3) rotate(0deg); opacity: 0.4; }
  100% { transform: translateX(-50%) scale(0) rotate(0deg); opacity: 0; }
}

/* ── FAN SCREEN ── */
.fan-screen {
  position: fixed;
  inset: 0;
  z-index: 20;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 3rem;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.5s ease;
}
.fan-screen.active {
  opacity: 1;
  pointer-events: all;
}

.fan-eyebrow {
  font-size: 0.54rem;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: rgba(212,165,116,0.4);
}
.fan-title {
  font-family: 'Playfair Display', serif;
  font-weight: 900;
  font-size: 1.3rem;
  color: rgba(255,255,255,0.9);
  text-align: center;
  margin-top: -2rem;
}

/* ── CARD FAN ── */
.card-fan {
  position: relative;
  width: 320px;
  height: 260px;
  display: flex;
  align-items: flex-end;
  justify-content: center;
}

.fan-card {
  position: absolute;
  width: 130px;
  height: 182px;
  border-radius: 12px;
  cursor: pointer;
  transform-origin: bottom center;
  transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.3, 1), box-shadow 0.3s ease, z-index 0s;
  transform-style: preserve-3d;
}

.fan-card-inner {
  width: 100%;
  height: 100%;
  position: relative;
  transform-style: preserve-3d;
  transition: transform 0.65s cubic-bezier(0.45, 0.05, 0.2, 1);
  border-radius: 12px;
}

.fan-card.flipped .fan-card-inner {
  transform: rotateY(180deg);
}

.fan-back, .fan-front {
  position: absolute;
  inset: 0;
  border-radius: 12px;
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
  overflow: hidden;
}

.fan-back {
  background: linear-gradient(145deg, #1a1f36 0%, #252b47 50%, #1a1f36 100%);
  border: 1.5px solid rgba(212,165,116,0.25);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 0.4rem;
}
.fan-back-wm {
  font-family: 'Playfair Display', serif;
  font-weight: 900;
  font-size: 1.1rem;
  letter-spacing: 5px;
  background: linear-gradient(135deg, #d4a574, #f0c878, #d4a574);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.fan-back-cross { font-size: 1rem; opacity: 0.2; }

.fan-front {
  transform: rotateY(180deg);
  border: 2px solid rgba(212,165,116,0.4);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-end;
  position: relative;
}
.fan-front-img {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  background: linear-gradient(145deg, #1a1f36, #252b47);
  display: flex;
  align-items: center;
  justify-content: center;
}
.fan-front-overlay {
  position: relative;
  z-index: 2;
  width: 100%;
  padding: 0.7rem 0.6rem;
  background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.4) 70%, transparent 100%);
  text-align: center;
}
.fan-saint-name {
  font-family: 'Playfair Display', serif;
  font-weight: 700;
  font-size: 0.7rem;
  color: #fff;
  line-height: 1.2;
  margin-bottom: 0.2rem;
}
.fan-rarity {
  font-size: 0.38rem;
  letter-spacing: 1.5px;
  text-transform: uppercase;
}

/* Fan positions — 5 cards */
.fan-card:nth-child(1) {
  bottom: 0;
  transform: rotate(-20deg) translateX(-110px);
  z-index: 1;
}
.fan-card:nth-child(2) {
  bottom: 0;
  transform: rotate(-10deg) translateX(-55px);
  z-index: 2;
}
.fan-card:nth-child(3) {
  bottom: 0;
  transform: rotate(0deg);
  z-index: 3;
}
.fan-card:nth-child(4) {
  bottom: 0;
  transform: rotate(10deg) translateX(55px);
  z-index: 2;
}
.fan-card:nth-child(5) {
  bottom: 0;
  transform: rotate(20deg) translateX(110px);
  z-index: 1;
}

/* Hover: card lifts from fan */
.fan-card:not(.flipped):hover:nth-child(1) { transform: rotate(-20deg) translateX(-110px) translateY(-22px) scale(1.08); z-index: 10; }
.fan-card:not(.flipped):hover:nth-child(2) { transform: rotate(-10deg) translateX(-55px) translateY(-22px) scale(1.08); z-index: 10; }
.fan-card:not(.flipped):hover:nth-child(3) { transform: rotate(0deg) translateY(-22px) scale(1.08); z-index: 10; }
.fan-card:not(.flipped):hover:nth-child(4) { transform: rotate(10deg) translateX(55px) translateY(-22px) scale(1.08); z-index: 10; }
.fan-card:not(.flipped):hover:nth-child(5) { transform: rotate(20deg) translateX(110px) translateY(-22px) scale(1.08); z-index: 10; }

/* After flip: card floats to center */
.fan-card.flipped {
  z-index: 20 !important;
  transform: rotate(0deg) translateX(0) translateY(-50px) scale(1.15) !important;
}

.fan-hint {
  font-size: 0.52rem;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: rgba(212,165,116,0.4);
  text-align: center;
  animation: fade-pulse 2s ease-in-out infinite;
}
.fan-progress {
  font-size: 0.48rem;
  letter-spacing: 2px;
  color: rgba(255,255,255,0.2);
}

/* Rarity tier front card styles */
.fan-front.uncommon { border-color: rgba(180,200,220,0.5); background: linear-gradient(145deg, #0d1016, #141c28); }
.fan-front.uncommon .fan-rarity { color: #b4c8dc; }
.fan-front.rare { border-color: rgba(196,60,60,0.7); background: linear-gradient(145deg, #140909, #200d0d); box-shadow: 0 0 20px rgba(196,60,60,0.25); }
.fan-front.rare .fan-rarity { color: #e87878; }
.fan-front.legendary { border-color: rgba(212,165,116,0.8); background: linear-gradient(145deg, #120e05, #1e1608); box-shadow: 0 0 30px rgba(212,165,116,0.3); }
.fan-front.legendary .fan-rarity { color: #d4a574; }

/* ── FLASH ── */
.rarity-flash {
  position: fixed; inset: 0; pointer-events: none; z-index: 200; opacity: 0;
}
.rarity-flash.flash-gold {
  background: radial-gradient(ellipse at center, rgba(212,165,116,0.35) 0%, transparent 60%);
  animation: do-flash 0.9s ease-out forwards;
}
.rarity-flash.flash-red {
  background: radial-gradient(ellipse at center, rgba(196,60,60,0.3) 0%, transparent 60%);
  animation: do-flash 0.6s ease-out forwards;
}
@keyframes do-flash { 0%{opacity:1} 100%{opacity:0} }

/* ── COLLECT BTN ── */
.collect-row {
  opacity: 0;
  transform: translateY(12px);
  transition: opacity 0.5s ease, transform 0.5s ease;
  pointer-events: none;
}
.collect-row.visible {
  opacity: 1;
  transform: translateY(0);
  pointer-events: all;
}
.collect-btn {
  font-family: 'Cinzel', serif;
  font-size: 0.7rem;
  letter-spacing: 3px;
  text-transform: uppercase;
  background: linear-gradient(135deg, #d4a574, #b8895a);
  color: #0f1222;
  border: none;
  padding: 0.8rem 2.5rem;
  border-radius: 6px;
  cursor: pointer;
  font-weight: 700;
  box-shadow: 0 4px 20px rgba(212,165,116,0.3);
  transition: transform 0.2s ease, box-shadow 0.2s ease;
}
.collect-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 30px rgba(212,165,116,0.4);
}

/* ── FAN CARD ENTRANCE ── */
@keyframes fan-deal-1 { from { transform: rotate(-20deg) translateX(-110px) translateY(200px) scale(0.5); opacity:0; } to { transform: rotate(-20deg) translateX(-110px); opacity:1; } }
@keyframes fan-deal-2 { from { transform: rotate(-10deg) translateX(-55px) translateY(200px) scale(0.5); opacity:0; } to { transform: rotate(-10deg) translateX(-55px); opacity:1; } }
@keyframes fan-deal-3 { from { transform: translateY(200px) scale(0.5); opacity:0; } to { transform: rotate(0deg); opacity:1; } }
@keyframes fan-deal-4 { from { transform: rotate(10deg) translateX(55px) translateY(200px) scale(0.5); opacity:0; } to { transform: rotate(10deg) translateX(55px); opacity:1; } }
@keyframes fan-deal-5 { from { transform: rotate(20deg) translateX(110px) translateY(200px) scale(0.5); opacity:0; } to { transform: rotate(20deg) translateX(110px); opacity:1; } }

.fan-card.deal-1 { animation: fan-deal-1 0.5s cubic-bezier(0.2,0.8,0.3,1) both; }
.fan-card.deal-2 { animation: fan-deal-2 0.5s cubic-bezier(0.2,0.8,0.3,1) 0.1s both; }
.fan-card.deal-3 { animation: fan-deal-3 0.5s cubic-bezier(0.2,0.8,0.3,1) 0.2s both; }
.fan-card.deal-4 { animation: fan-deal-4 0.5s cubic-bezier(0.2,0.8,0.3,1) 0.3s both; }
.fan-card.deal-5 { animation: fan-deal-5 0.5s cubic-bezier(0.2,0.8,0.3,1) 0.4s both; }

.mockup-label {
  position: fixed;
  bottom: 1.5rem;
  left: 50%;
  transform: translateX(-50%);
  font-size: 0.5rem;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.15);
  z-index: 999;
  white-space: nowrap;
}
</style>
</head>
<body>

<div class="rarity-flash" id="rarityFlash"></div>
<div class="mockup-label">Mockup 2 — Sacred Fan · Break the seal · Tap any card to reveal</div>

<!-- ── PACK SCREEN ── -->
<div class="pack-screen" id="packScreen">
  <p class="pack-eyebrow">CRUX Faith Formation · Alpha Pack</p>
  <div class="pack-container" onclick="breakSeal()">
    <div class="wax-seal" id="waxSeal">
      <span class="wax-seal-cross">✟</span>
    </div>
    <div class="pack-body">
      <div class="pack-inner-bg">
        <span class="pack-inner-cross">✟</span>
        <span class="pack-wordmark">CRUX</span>
        <div class="pack-line"></div>
        <span class="pack-sub-text">Alpha Pack · 5 Cards</span>
      </div>
    </div>
  </div>
  <p class="pack-cta">Break the seal to reveal your saints</p>
</div>

<!-- ── FAN SCREEN ── -->
<div class="fan-screen" id="fanScreen">
  <div>
    <p class="fan-eyebrow" style="text-align:center;margin-bottom:0.5rem;">Your pack contained</p>
    <h2 class="fan-title">5 Saints</h2>
  </div>

  <div class="card-fan" id="cardFan">
    <!-- Cards injected by JS -->
  </div>

  <div>
    <p class="fan-hint" id="fanHint">Tap any card to reveal</p>
    <p class="fan-progress" id="fanProgress" style="text-align:center;margin-top:0.5rem;">0 / 5 revealed</p>
  </div>

  <div class="collect-row" id="collectRow">
    <button class="collect-btn" onclick="reset()">Collect Your Saints</button>
  </div>
</div>

<script>
const CARDS = [
  { name: 'St. Thomas Aquinas',      rarity: 'rare',      stars: '✦✦ Rare' },
  { name: 'St. Cecilia',             rarity: 'uncommon',  stars: '✦ Uncommon' },
  { name: 'Blessed Virgin Mary',     rarity: 'legendary', stars: '✦✦✦✦ Legendary' },
  { name: 'St. Francis of Assisi',   rarity: 'uncommon',  stars: '✦ Uncommon' },
  { name: 'St. Peter',               rarity: 'legendary', stars: '✦✦✦ Legendary' },
];

let revealCount = 0;
const dealClasses = ['deal-1','deal-2','deal-3','deal-4','deal-5'];

function breakSeal() {
  const seal = document.getElementById('waxSeal');
  seal.style.animation = 'seal-crack 0.6s ease-in-out forwards';
  setTimeout(() => {
    document.getElementById('packScreen').style.opacity = '0';
    document.getElementById('packScreen').style.pointerEvents = 'none';
    setTimeout(dealCards, 400);
  }, 500);
}

function dealCards() {
  const fan = document.getElementById('cardFan');
  fan.innerHTML = '';

  CARDS.forEach((card, i) => {
    const fc = document.createElement('div');
    fc.className = 'fan-card ' + dealClasses[i];
    fc.dataset.idx = i;
    fc.onclick = () => revealFanCard(fc, card);
    fc.innerHTML = `
      <div class="fan-card-inner">
        <div class="fan-back">
          <span class="fan-back-cross">✟</span>
          <span class="fan-back-wm">CRUX</span>
        </div>
        <div class="fan-front ${card.rarity}">
          <div class="fan-front-img" style="display:flex;align-items:center;justify-content:center;">
            <span style="font-size:0.6rem;letter-spacing:1px;color:rgba(212,165,116,0.3);text-transform:uppercase;">✟</span>
          </div>
          <div class="fan-front-overlay">
            <div class="fan-saint-name">${card.name}</div>
            <div class="fan-rarity">${card.stars}</div>
          </div>
        </div>
      </div>
    `;
    fan.appendChild(fc);
  });

  document.getElementById('fanScreen').classList.add('active');
}

function revealFanCard(el, card) {
  if (el.classList.contains('flipped')) return;
  el.classList.add('flipped');
  revealCount++;

  // Flash
  const flash = document.getElementById('rarityFlash');
  flash.className = 'rarity-flash';
  void flash.offsetWidth;
  if (card.rarity === 'legendary')     flash.classList.add('flash-gold');
  else if (card.rarity === 'rare')     flash.classList.add('flash-red');

  document.getElementById('fanProgress').textContent = `${revealCount} / ${CARDS.length} revealed`;

  if (revealCount === CARDS.length) {
    setTimeout(() => {
      document.getElementById('fanHint').style.opacity = '0';
      document.getElementById('collectRow').classList.add('visible');
    }, 800);
  }
}

function reset() {
  revealCount = 0;
  document.getElementById('fanScreen').classList.remove('active');
  document.getElementById('collectRow').classList.remove('visible');
  document.getElementById('fanHint').style.opacity = '';
  document.getElementById('fanProgress').textContent = '0 / 5 revealed';
  const seal = document.getElementById('waxSeal');
  seal.style.animation = '';
  const packScreen = document.getElementById('packScreen');
  packScreen.style.opacity = '';
  packScreen.style.pointerEvents = '';
  void seal.offsetWidth;
}
</script>
</body>
</html>
