<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRUX — Practice Games</title>

    <script async src="https://www.googletagmanager.com/gtag/js?id=G-LQ35DLTVKY"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-LQ35DLTVKY');
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,900;1,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <script type="module">
        import { initializeApp, getApps } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getFirestore, doc, getDoc, setDoc, updateDoc, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';
        import { getAuth, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
        const _fbCfg = {
            apiKey:"AIzaSyCq2cyJUMIA9pGWz9PZ8VPdw1hi0-iv3cU",
            authDomain:"crux-faith-formation.firebaseapp.com",
            projectId:"crux-faith-formation",
            storageBucket:"crux-faith-formation.firebasestorage.app",
            messagingSenderId:"838141015985",
            appId:"1:838141015985:web:2655e570663e182d75ef90"
        };
        const app = getApps().length ? getApps()[0] : initializeApp(_fbCfg);
        window.db = getFirestore(app);
        window.auth = getAuth(app);
        window.fsOps = { doc, getDoc, setDoc, updateDoc, serverTimestamp };
        onAuthStateChanged(window.auth, user => {
            window.currentUser = user || null;
            const el = document.getElementById('userChip');
            if (el) el.textContent = user ? user.email.split('@')[0] : 'Guest';
            if (user) loadXP(user.uid);
        });
        async function loadXP(uid) {
            try {
                const snap = await getDoc(doc(window.db,'userProgress',uid));
                if (snap.exists()) {
                    const xp = snap.data().totalXP || 0;
                    const el = document.getElementById('xpChip');
                    if (el) { el.textContent=`⭐ ${xp} XP`; el.style.display='inline-flex'; }
                }
            } catch(e) { console.error(e); }
        }
    </script>

    <style>
        :root{--navy:#1a1f36;--navy-mid:#242a45;--navy-light:#2f3659;--gold:#d4a574;--gold-light:#e8c9a0;--gold-dark:#b8895a;--white:#ffffff;--off-white:#f8f7f4;--text-primary:#1a1f36;--text-secondary:#5a6282;--text-muted:#8890b0;--border:rgba(26,31,54,0.1);--border-gold:rgba(212,165,116,0.3);--shadow-sm:0 2px 8px rgba(26,31,54,0.08);--shadow-md:0 4px 20px rgba(26,31,54,0.12);--shadow-lg:0 8px 40px rgba(26,31,54,0.18);--green:#2e7d32;--green-light:#e8f5e9;--red:#c62828;--red-light:#ffebee;}
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Inter',sans-serif;background:var(--off-white);color:var(--text-primary);min-height:100vh;}
        header{background:var(--navy);padding:1rem 2rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;box-shadow:0 4px 24px rgba(0,0,0,0.2);}
        .header-left{display:flex;align-items:center;gap:1.25rem;}
        .logo{font-family:'Playfair Display',serif;font-size:1.5rem;font-weight:900;color:var(--gold);letter-spacing:5px;text-decoration:none;}
        .page-label{font-size:0.72rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,0.35);border-left:1px solid rgba(255,255,255,0.12);padding-left:1.25rem;}
        .header-right{display:flex;align-items:center;gap:0.75rem;}
        .user-chip{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.1);color:rgba(255,255,255,0.6);padding:0.3rem 0.8rem;border-radius:20px;font-size:0.78rem;}
        .xp-chip{background:rgba(212,165,116,0.12);border:1px solid var(--border-gold);color:var(--gold);padding:0.3rem 0.8rem;border-radius:20px;font-size:0.78rem;font-weight:700;display:none;}
        .btn-back{color:rgba(255,255,255,0.5);font-size:0.82rem;font-weight:500;text-decoration:none;border:1.5px solid rgba(255,255,255,0.15);padding:0.4rem 0.9rem;border-radius:6px;transition:all 0.2s;}
        .btn-back:hover{color:var(--gold);border-color:var(--gold);}
        .page-wrap{max-width:860px;margin:0 auto;padding:3rem 2rem 6rem;}
        .lesson-hero{background:var(--navy);border-radius:14px;padding:2.5rem 3rem;margin-bottom:2.5rem;position:relative;overflow:hidden;}
        .lesson-hero::before{content:'✟';position:absolute;font-size:16rem;color:rgba(212,165,116,0.04);right:1rem;bottom:-2rem;line-height:1;}
        .lesson-hero .eyebrow{font-size:0.7rem;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:var(--gold);margin-bottom:0.5rem;position:relative;}
        .lesson-hero h1{font-family:'Playfair Display',serif;font-size:2rem;color:var(--white);font-weight:700;margin-bottom:0.5rem;position:relative;}
        .lesson-hero p{color:rgba(255,255,255,0.55);font-size:0.9rem;position:relative;}
        .game-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.25rem;margin-bottom:1.25rem;}
        .game-card{background:var(--white);border-radius:12px;border:1px solid var(--border);box-shadow:var(--shadow-sm);overflow:hidden;cursor:pointer;transition:all 0.25s ease;}
        .game-card:hover{transform:translateY(-3px);box-shadow:var(--shadow-md);border-color:var(--border-gold);}
        .game-card.completed{border-color:var(--green);}
        .game-card-top{padding:1.5rem;display:flex;align-items:flex-start;gap:1rem;}
        .game-icon{width:44px;height:44px;border-radius:10px;background:var(--navy);display:flex;align-items:center;justify-content:center;font-size:1.3rem;flex-shrink:0;}
        .game-meta{flex:1;}
        .game-name{font-family:'Playfair Display',serif;font-size:1.05rem;color:var(--navy);font-weight:700;margin-bottom:0.25rem;}
        .game-desc{font-size:0.8rem;color:var(--text-muted);line-height:1.5;}
        .game-card-footer{padding:0.75rem 1.5rem;background:var(--off-white);border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;font-size:0.75rem;}
        .game-xp{color:var(--gold-dark);font-weight:700;}
        .game-status{color:var(--text-muted);font-weight:500;}
        .game-status.done{color:var(--green);font-weight:700;}
        .game-overlay{position:fixed;inset:0;background:rgba(26,31,54,0.75);display:none;align-items:center;justify-content:center;z-index:500;padding:1rem;backdrop-filter:blur(6px);}
        .game-overlay.open{display:flex;}
        .game-modal{background:var(--white);border-radius:16px;width:100%;max-width:640px;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-lg);animation:modalIn 0.25s ease;}
        @keyframes modalIn{from{opacity:0;transform:translateY(20px) scale(0.97);}to{opacity:1;transform:translateY(0) scale(1);}}
        .game-modal-header{padding:1.75rem 2rem 1.25rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--white);border-radius:16px 16px 0 0;z-index:10;}
        .game-modal-title{font-family:'Playfair Display',serif;font-size:1.3rem;color:var(--navy);font-weight:700;}
        .btn-close-game{background:none;border:1.5px solid var(--border);color:var(--text-muted);width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;transition:all 0.2s;}
        .btn-close-game:hover{border-color:var(--red);color:var(--red);}
        .game-modal-body{padding:2rem;}
        .score-bar{display:flex;align-items:center;justify-content:space-between;padding:0.75rem 1rem;background:var(--off-white);border-radius:8px;margin-bottom:1.75rem;font-size:0.82rem;font-weight:600;}
        .score-bar .score{color:var(--navy);}
        .score-bar .progress-text{color:var(--text-muted);}
        /* Flashcard */
        .flashcard-wrap{perspective:1000px;margin:0 auto 1.5rem;cursor:pointer;height:220px;}
        .flashcard{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform 0.5s ease;}
        .flashcard.flipped{transform:rotateY(180deg);}
        .flashcard-face{position:absolute;inset:0;border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:2rem;backface-visibility:hidden;-webkit-backface-visibility:hidden;}
        .flashcard-front{background:var(--navy);border:2px solid rgba(212,165,116,0.2);}
        .flashcard-back{background:var(--off-white);border:2px solid var(--border-gold);transform:rotateY(180deg);}
        .flashcard-front .card-label{font-size:0.68rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin-bottom:0.75rem;}
        .flashcard-front .card-term{font-family:'Playfair Display',serif;font-size:1.8rem;color:var(--white);font-weight:700;line-height:1.2;}
        .flashcard-back .card-label{font-size:0.68rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--gold-dark);margin-bottom:0.75rem;}
        .flashcard-back .card-def{font-size:1rem;color:var(--text-primary);line-height:1.65;}
        .flashcard-hint{text-align:center;font-size:0.78rem;color:var(--text-muted);margin-bottom:1.5rem;}
        .flashcard-nav{display:flex;gap:0.75rem;justify-content:center;}
        /* Scramble */
        .scramble-clue{background:rgba(212,165,116,0.08);border-left:3px solid var(--gold);border-radius:0 8px 8px 0;padding:1rem 1.25rem;margin-bottom:1.5rem;font-size:0.95rem;color:var(--text-primary);line-height:1.6;font-style:italic;}
        .scramble-letters,.answer-slots{display:flex;flex-wrap:wrap;gap:0.5rem;justify-content:center;margin-bottom:1.5rem;}
        .answer-slots{min-height:56px;}
        .letter-tile{width:44px;height:52px;background:var(--navy);color:var(--gold);border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-size:1.4rem;font-weight:700;cursor:pointer;transition:all 0.15s;user-select:none;border:2px solid transparent;}
        .letter-tile:hover{background:var(--navy-light);transform:translateY(-2px);}
        .letter-tile.used{opacity:0.25;cursor:default;transform:none;}
        .answer-slot{width:44px;height:52px;border-radius:8px;border:2px solid var(--border);background:var(--off-white);display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-size:1.4rem;font-weight:700;color:var(--navy);cursor:pointer;transition:all 0.15s;}
        .answer-slot.filled{background:var(--white);border-color:var(--navy);}
        .answer-slot.correct{border-color:var(--green);background:var(--green-light);color:var(--green);}
        .answer-slot.incorrect{border-color:var(--red);background:var(--red-light);color:var(--red);}
        /* Matching */
        .match-grid{display:grid;grid-template-columns:1fr 1fr;gap:0.75rem;margin-bottom:1.5rem;}
        .match-col{display:flex;flex-direction:column;gap:0.6rem;}
        .match-item{padding:0.85rem 1rem;border-radius:8px;border:2px solid var(--border);background:var(--off-white);font-size:0.88rem;font-weight:600;cursor:pointer;transition:all 0.2s;text-align:center;line-height:1.4;user-select:none;}
        .match-item.term{color:var(--navy);}
        .match-item.definition{color:var(--text-secondary);font-weight:400;}
        .match-item.selected{border-color:var(--navy);background:rgba(26,31,54,0.06);}
        .match-item.matched-correct{border-color:var(--green);background:var(--green-light);color:var(--green);cursor:default;}
        .match-item.matched-wrong{border-color:var(--red);background:var(--red-light);animation:shake 0.3s ease;}
        @keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-6px);}75%{transform:translateX(6px);}}
        /* True/False */
        .tf-statement{background:var(--navy);border-radius:12px;padding:2rem;text-align:center;margin-bottom:1.5rem;min-height:120px;display:flex;align-items:center;justify-content:center;}
        .tf-statement p{font-family:'Playfair Display',serif;font-size:1.2rem;color:var(--white);line-height:1.5;font-weight:600;}
        .tf-buttons{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1.5rem;}
        .btn-tf{padding:1.1rem;border-radius:10px;border:2px solid var(--border);background:var(--off-white);font-size:1.1rem;font-weight:700;cursor:pointer;transition:all 0.2s;font-family:'Inter',sans-serif;}
        .btn-tf.true-btn:hover{border-color:var(--green);background:var(--green-light);}
        .btn-tf.false-btn:hover{border-color:var(--red);background:var(--red-light);}
        .btn-tf.correct{border-color:var(--green);background:var(--green-light);color:var(--green);}
        .btn-tf.incorrect{border-color:var(--red);background:var(--red-light);color:var(--red);}
        .btn-tf:disabled{cursor:default;}
        .tf-feedback{padding:0.85rem 1.1rem;border-radius:8px;font-size:0.9rem;font-weight:600;text-align:center;display:none;margin-bottom:1rem;}
        .tf-feedback.correct{background:var(--green-light);color:var(--green);display:block;}
        .tf-feedback.incorrect{background:var(--red-light);color:var(--red);display:block;}
        /* Fill in blank */
        .fitb-sentence{font-family:'Playfair Display',serif;font-size:1.25rem;color:var(--navy);text-align:center;line-height:1.8;margin-bottom:1.5rem;padding:1.5rem;background:var(--off-white);border-radius:10px;border:1px solid var(--border);}
        .fitb-blank{display:inline-block;min-width:120px;border-bottom:3px solid var(--navy);color:var(--navy);font-weight:700;padding:0 0.25rem;}
        .word-bank{display:flex;flex-wrap:wrap;gap:0.6rem;justify-content:center;margin-bottom:1.5rem;}
        .word-chip{padding:0.5rem 1.1rem;background:var(--white);border:1.5px solid var(--border);border-radius:25px;font-size:0.88rem;font-weight:600;cursor:pointer;transition:all 0.2s;color:var(--text-primary);}
        .word-chip:hover{border-color:var(--navy);background:rgba(26,31,54,0.04);}
        .word-chip.correct{border-color:var(--green);background:var(--green-light);color:var(--green);cursor:default;}
        .word-chip.incorrect{border-color:var(--red);background:var(--red-light);color:var(--red);}
        /* Drag and drop */
        .dnd-bank{display:flex;flex-wrap:wrap;gap:0.6rem;justify-content:center;min-height:56px;padding:1rem;background:var(--off-white);border-radius:10px;border:1.5px dashed var(--border);margin-bottom:1.5rem;}
        .dnd-chip{padding:0.5rem 1rem;background:var(--navy);color:var(--white);border-radius:8px;font-size:0.85rem;font-weight:600;cursor:grab;transition:all 0.15s;user-select:none;}
        .dnd-chip:active{cursor:grabbing;transform:scale(1.05);}
        .dnd-chip.dragging{opacity:0.4;}
        .dnd-categories{display:grid;gap:0.75rem;}
        .dnd-categories.cols-2{grid-template-columns:1fr 1fr;}
        .dnd-categories.cols-3{grid-template-columns:1fr 1fr 1fr;}
        .dnd-category{border-radius:10px;border:2px dashed var(--border);background:var(--white);padding:0.75rem;min-height:100px;transition:all 0.2s;}
        .dnd-category.drag-over{border-color:var(--gold);background:rgba(212,165,116,0.05);}
        .dnd-cat-label{font-size:0.72rem;font-weight:800;letter-spacing:0.8px;text-transform:uppercase;color:var(--gold-dark);margin-bottom:0.6rem;text-align:center;}
        .dnd-category .dnd-chip{margin-bottom:0.4rem;width:100%;text-align:center;cursor:pointer;}
        .dnd-category .dnd-chip.correct{background:var(--green);}
        .dnd-category .dnd-chip.incorrect{background:var(--red);}
        /* Buttons */
        .btn-game{display:inline-flex;align-items:center;gap:0.4rem;padding:0.75rem 1.5rem;background:var(--navy);color:var(--white);border:none;border-radius:8px;font-size:0.88rem;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;transition:all 0.2s;}
        .btn-game:hover{background:var(--navy-light);}
        .btn-game:disabled{background:#ccc;cursor:not-allowed;}
        .btn-game.gold{background:var(--gold-dark);color:var(--white);}
        .btn-game.gold:hover{background:var(--gold);color:var(--navy);}
        .btn-game.outline{background:transparent;color:var(--navy);border:1.5px solid var(--border);}
        .btn-game.outline:hover{border-color:var(--navy);}
        .game-btn-row{display:flex;gap:0.75rem;justify-content:center;flex-wrap:wrap;}
        /* Win */
        .win-screen{text-align:center;padding:2rem 1rem;}
        .win-icon{font-size:3.5rem;margin-bottom:1rem;display:block;}
        .win-screen h3{font-family:'Playfair Display',serif;font-size:1.7rem;color:var(--navy);font-weight:700;margin-bottom:0.5rem;}
        .win-screen p{color:var(--text-secondary);font-size:0.95rem;margin-bottom:1.5rem;}
        .xp-award-badge{display:inline-flex;align-items:center;gap:0.5rem;background:var(--navy);color:var(--gold);padding:0.75rem 1.75rem;border-radius:50px;font-size:1.1rem;font-weight:700;margin-bottom:1.75rem;font-family:'Playfair Display',serif;}
        /* Toast */
        .toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(80px);background:var(--navy);color:var(--white);padding:0.8rem 1.6rem;border-radius:50px;font-size:0.88rem;font-weight:600;box-shadow:var(--shadow-lg);transition:transform 0.3s ease;z-index:2000;white-space:nowrap;}
        .toast.show{transform:translateX(-50%) translateY(0);}
        /* Not found */
        .not-found{text-align:center;padding:5rem 2rem;}
        .not-found h2{font-family:'Playfair Display',serif;font-size:1.8rem;color:var(--navy);margin-bottom:1rem;}
        .not-found p{color:var(--text-muted);margin-bottom:2rem;}
        @media(max-width:600px){.game-grid{grid-template-columns:1fr;}.match-grid{grid-template-columns:1fr;}.dnd-categories.cols-3{grid-template-columns:1fr;}.tf-buttons{grid-template-columns:1fr;}.page-wrap{padding:1.5rem 1rem 4rem;}.lesson-hero{padding:1.75rem;}}
    </style>
</head>
<body>
<header>
    <div class="header-left">
        <a href="index.html" class="logo">CRUX</a>
        <span class="page-label" id="pageLabel">Practice Games</span>
    </div>
    <div class="header-right">
        <span class="xp-chip" id="xpChip"></span>
        <span class="user-chip" id="userChip">Guest</span>
        <a href="#" class="btn-back" id="backBtn">← Back to Lesson</a>
    </div>
</header>

<div class="page-wrap">
    <div class="lesson-hero">
        <div class="eyebrow" id="heroEyebrow">Faith Formation</div>
        <h1 id="heroTitle">Practice Games</h1>
        <p id="heroDesc">Six games to reinforce what you've learned. Complete each one to earn XP.</p>
    </div>
    <div class="game-grid" id="gameGrid"></div>
</div>

<div class="game-overlay" id="gameOverlay">
    <div class="game-modal">
        <div class="game-modal-header">
            <span class="game-modal-title" id="gameModalTitle">Game</span>
            <button class="btn-close-game" onclick="closeGame()">✕</button>
        </div>
        <div class="game-modal-body" id="gameModalBody"></div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════════════════════════════
// ALL MODULE GAME DATA
// ══════════════════════════════════════════════════════════
const GAME_MODULES = {

// ─── SACRAMENTS ───────────────────────────────────────────
sacraments: {
    title: 'The Seven Sacraments',
    eyebrow: 'Chapter 1 · Core Beliefs',
    desc: 'Six games to reinforce what you\'ve learned. Complete each one to earn XP.',
    moduleLink: 'crux-modules.html?module=sacraments',
    games: [
        { id:'flashcard',   icon:'🃏', name:'Flashcards',       desc:'Flip each card to reveal the definition. Test yourself on all 7 sacraments.',          xp:15 },
        { id:'scramble',    icon:'🔤', name:'Word Scramble',    desc:'Unscramble key sacrament vocabulary. Tap letters to build the answer.',               xp:15 },
        { id:'matching',    icon:'🔗', name:'Matching Pairs',   desc:'Match each sacrament to its correct description.',                                    xp:20 },
        { id:'truefalse',   icon:'✅', name:'True or False',    desc:'Quick-fire statements about the sacraments. How fast can you go?',                   xp:15 },
        { id:'fillinblank', icon:'✏️', name:'Fill in the Blank',desc:'Complete sentences about the sacraments by selecting the right word.',                xp:15 },
        { id:'dragdrop',    icon:'🗂️', name:'Sort the Sacraments',desc:'Drag each sacrament into the correct category: Initiation, Healing, or Service.',  xp:20 },
    ],
    flashcards: [
        { term:'Baptism',               def:'The first sacrament — water is poured and we are born into God\'s family. Original sin is washed away and we receive the Holy Spirit.' },
        { term:'Confirmation',          def:'We receive the gifts of the Holy Spirit to strengthen our faith. We become full members of the Church.' },
        { term:'Eucharist',             def:'The bread and wine truly become the Body and Blood of Jesus Christ. It is the "source and summit" of the Christian life.' },
        { term:'Reconciliation',        def:'Also called Confession or Penance. Our sins are forgiven by God through the ministry of the priest.' },
        { term:'Anointing of the Sick', def:'God\'s healing grace for the seriously ill or dying. The priest anoints with oil and prays for healing.' },
        { term:'Holy Orders',           def:'A man is ordained as a deacon, priest, or bishop, configured to Christ as servant and shepherd of the Church.' },
        { term:'Matrimony',             def:'A man and woman enter a lifelong covenant of love, open to children, as a sign of Christ\'s love for the Church.' },
    ],
    scrambles: [
        { word:'BAPTISM',            clue:'The sacrament in which we are born into God\'s family and original sin is washed away.' },
        { word:'EUCHARIST',          clue:'The sacrament in which bread and wine truly become the Body and Blood of Jesus.' },
        { word:'CONFIRMATION',       clue:'The sacrament that strengthens our faith through the gifts of the Holy Spirit.' },
        { word:'RECONCILIATION',     clue:'The sacrament in which we confess our sins and receive God\'s forgiveness through the priest.' },
        { word:'MATRIMONY',          clue:'The sacrament of marriage — a lifelong covenant between a man and a woman.' },
    ],

let MODULE_ID  = new URLSearchParams(window.location.search).get('module') || 'sacraments';
let MODULE     = GAME_MODULES[MODULE_ID] || null;

const completed  = {};
const XP_VALUES  = {};
let activeGame   = null;
let fcIndex=0, fcFlipped=false;
let scrIndex=0, scrAnswer=[], scrUsed=[];
let matchSelected=null, matchedCount=0;
let tfIndex=0, tfScore=0;
let fitbIndex=0;
let dndDragging=null;

window.addEventListener('DOMContentLoaded', () => {
    if (!MODULE) { renderNotFound(); return; }

    // Set page meta
    document.title = `CRUX — ${MODULE.title} Games`;
    document.getElementById('pageLabel').textContent = MODULE.title;
    document.getElementById('heroEyebrow').textContent = MODULE.eyebrow;
    document.getElementById('heroTitle').textContent   = 'Practice Games';
    document.getElementById('heroDesc').textContent    = MODULE.desc;
    document.getElementById('backBtn').href = MODULE.moduleLink;

    // Build XP map
    MODULE.games.forEach(g => { XP_VALUES[g.id] = g.xp; completed[g.id] = false; });

    // Render game cards
    const grid = document.getElementById('gameGrid');
    grid.innerHTML = MODULE.games.map(g => `
        <div class="game-card" id="card-${g.id}" onclick="openGame('${g.id}')">
            <div class="game-card-top">
                <div class="game-icon">${g.icon}</div>
                <div class="game-meta">
                    <div class="game-name">${g.name}</div>
                    <div class="game-desc">${g.desc}</div>
                </div>
            </div>
            <div class="game-card-footer">
                <span class="game-xp">+${g.xp} XP</span>
                <span class="game-status" id="status-${g.id}">Not started</span>
            </div>
        </div>`).join('');
});

function renderNotFound() {
    document.querySelector('.page-wrap').innerHTML = `
        <div class="not-found">
            <h2>Module Not Found</h2>
            <p>That module doesn't exist yet. Check back soon!</p>
            <a href="index.html" class="btn-game">← Back to CRUX</a>
        </div>`;
}

    activeGame = gameId;
    // Reset per-game state each open
    if (gameId==='flashcard')   { fcIndex=0; fcFlipped=false; }
    if (gameId==='scramble')    { scrIndex=0; scrAnswer=[]; scrUsed=[]; }
    if (gameId==='matching')    { matchSelected=null; matchedCount=0; }
    if (gameId==='truefalse')   { tfIndex=0; tfScore=0; }
    if (gameId==='fillinblank') { fitbIndex=0; }

    const gameConfig = MODULE.games.find(g => g.id === gameId);
    document.getElementById('gameModalTitle').textContent = gameConfig ? `${gameConfig.icon} ${gameConfig.name}` : 'Game';
    document.getElementById('gameOverlay').classList.add('open');
    renderGame(gameId);
}

window.openGame = openGame;

window.closeGame = function() {
    document.getElementById('gameOverlay').classList.remove('open');
    activeGame = null;
};

document.getElementById('gameOverlay').addEventListener('click', e => {
    if (e.target === document.getElementById('gameOverlay')) window.closeGame();
});

function renderGame(gameId) {
    const body = document.getElementById('gameModalBody');
    const fns = { flashcard:renderFlashcard, scramble:renderScramble, matching:renderMatching, truefalse:renderTrueFalse, fillinblank:renderFillBlank, dragdrop:renderDragDrop };
    if (fns[gameId]) fns[gameId](body);
}

// ══════════════════════════════════════════════════════════
// 1. FLASHCARDS
// ══════════════════════════════════════════════════════════

function renderFlashcard(body) {
    const cards = MODULE.flashcards;
    if (!cards || !cards.length) { body.innerHTML='<p style="text-align:center;color:var(--text-muted);padding:2rem;">No flashcards for this module yet.</p>'; return; }
    const card = cards[fcIndex];
    body.innerHTML = `
        <div class="score-bar">
            <span class="score">Card ${fcIndex+1} of ${cards.length}</span>
            <span class="progress-text">${fcIndex} reviewed</span>
        </div>
        <div class="flashcard-wrap" onclick="flipCard()">
            <div class="flashcard" id="fc">
                <div class="flashcard-face flashcard-front"><div class="card-label">Term</div><div class="card-term">${card.term}</div></div>
                <div class="flashcard-face flashcard-back"><div class="card-label">Definition</div><div class="card-def">${card.def}</div></div>
            </div>
        </div>
        <p class="flashcard-hint" id="fcHint">Tap card to flip · Showing term</p>
        <div class="flashcard-nav">
            <button class="btn-game outline" onclick="fcNav(-1)" ${fcIndex===0?'disabled':''}>← Prev</button>
            ${fcIndex<cards.length-1
                ? `<button class="btn-game" onclick="fcNav(1)">Next →</button>`
                : `<button class="btn-game gold" onclick="finishFlashcards()">Finish ✓</button>`}
        </div>`;
    if (fcFlipped) document.getElementById('fc')?.classList.add('flipped');
}

window.flipCard = function() {
    fcFlipped = !fcFlipped;
    document.getElementById('fc')?.classList.toggle('flipped', fcFlipped);
    const h = document.getElementById('fcHint');
    if (h) h.textContent = `Tap card to flip · ${fcFlipped?'Showing definition':'Showing term'}`;
};

window.fcNav = function(dir) {
    fcIndex = Math.max(0, Math.min((MODULE.flashcards.length||1)-1, fcIndex+dir));
    fcFlipped = false;
    renderFlashcard(document.getElementById('gameModalBody'));
};

function finishFlashcards() {
    showWin('flashcard', MODULE.flashcards.length, MODULE.flashcards.length);
}

// ══════════════════════════════════════════════════════════
// 2. WORD SCRAMBLE
// ══════════════════════════════════════════════════════════

function renderScramble(body) {
    const items = MODULE.scrambles;
    if (!items || !items.length) { body.innerHTML='<p style="text-align:center;color:var(--text-muted);padding:2rem;">No scrambles for this module.</p>'; return; }
    if (scrIndex >= items.length) { showWin('scramble', items.length, items.length); return; }
    const item = items[scrIndex];
    const shuffled = item.word.split('').sort(()=>Math.random()-0.5);
    window._scrShuffled = shuffled;
    scrAnswer = new Array(item.word.length).fill(null);
    scrUsed   = new Array(shuffled.length).fill(false);
    body.innerHTML = `
        <div class="score-bar">
            <span class="score">Word ${scrIndex+1} of ${items.length}</span>
            <span class="progress-text">${scrIndex} solved</span>
        </div>
        <div class="scramble-clue">${item.clue}</div>
        <div class="answer-slots" id="answerSlots">
            ${item.word.split('').map((_,i)=>`<div class="answer-slot" id="slot${i}" onclick="unselectLetter(${i})"></div>`).join('')}
        </div>
        <div class="scramble-letters" id="letterBank">
            ${shuffled.map((l,i)=>`<div class="letter-tile" id="tile${i}" onclick="selectLetter('${l}',${i})">${l}</div>`).join('')}
        </div>
        <div class="game-btn-row">
            <button class="btn-game outline" onclick="resetScramble()">↺ Reset</button>
            <button class="btn-game" id="checkScrambleBtn" onclick="checkScramble()" disabled>Check →</button>
        </div>`;
}

window.selectLetter = function(letter, tileIdx) {
    if (scrUsed[tileIdx]) return;
    const first = scrAnswer.indexOf(null);
    if (first===-1) return;
    scrAnswer[first] = { letter, tileIdx };
    scrUsed[tileIdx] = true;
    document.getElementById(`tile${tileIdx}`)?.classList.add('used');
    const slot = document.getElementById(`slot${first}`);
    if (slot) { slot.textContent=letter; slot.classList.add('filled'); }
    document.getElementById('checkScrambleBtn').disabled = scrAnswer.some(s=>s===null);
};

window.unselectLetter = function(idx) {
    const entry = scrAnswer[idx]; if (!entry) return;
    scrUsed[entry.tileIdx]=false;
    document.getElementById(`tile${entry.tileIdx}`)?.classList.remove('used');
    const slot=document.getElementById(`slot${idx}`);
    if (slot){slot.textContent='';slot.classList.remove('filled');}
    scrAnswer[idx]=null;
    document.getElementById('checkScrambleBtn').disabled=true;
};

window.resetScramble = function() {
    const item=MODULE.scrambles[scrIndex];
    scrAnswer=new Array(item.word.length).fill(null);
    scrUsed=new Array(window._scrShuffled?.length||0).fill(false);
    document.querySelectorAll('.letter-tile').forEach(t=>t.classList.remove('used'));
    document.querySelectorAll('.answer-slot').forEach(s=>{s.textContent='';s.className='answer-slot';});
    document.getElementById('checkScrambleBtn').disabled=true;
};

window.checkScramble = function() {
    const guess=scrAnswer.map(s=>s?.letter||'').join('');
    const target=MODULE.scrambles[scrIndex].word;
    const correct=guess===target;
    document.querySelectorAll('.answer-slot').forEach(s=>s.classList.add(correct?'correct':'incorrect'));
    setTimeout(()=>{
        if (correct) {
            scrIndex++;
            if (scrIndex>=MODULE.scrambles.length) showWin('scramble',MODULE.scrambles.length,MODULE.scrambles.length);
            else { scrAnswer=[];scrUsed=[];renderScramble(document.getElementById('gameModalBody'));showToast('✓ Correct!'); }
        } else { showToast('Not quite — try again'); resetScramble(); }
    },700);
};

// ══════════════════════════════════════════════════════════
// 3. MATCHING
// ══════════════════════════════════════════════════════════

function renderMatching(body) {
    const pairs = MODULE.matching;
    if (!pairs || !pairs.length) { body.innerHTML='<p style="text-align:center;color:var(--text-muted);padding:2rem;">No matching pairs for this module.</p>'; return; }
    matchSelected=null; matchedCount=0;
    const sT=[...pairs].sort(()=>Math.random()-0.5);
    const sD=[...pairs].sort(()=>Math.random()-0.5);
    body.innerHTML=`
        <div class="score-bar">
            <span class="score">Matched: <span id="matchCount">0</span>/${pairs.length}</span>
            <span class="progress-text">Tap a term, then its definition</span>
        </div>
        <div class="match-grid">
            <div class="match-col">${sT.map(p=>`<div class="match-item term" data-id="${p.term}" onclick="matchClick('term','${p.term.replace(/'/g,"\\'")}',this)">${p.term}</div>`).join('')}</div>
            <div class="match-col">${sD.map(p=>`<div class="match-item definition" data-id="${p.term}" onclick="matchClick('def','${p.term.replace(/'/g,"\\'")}',this)">${p.def}</div>`).join('')}</div>
        </div>`;
}

window.matchClick = function(type,id,el) {
    if (el.classList.contains('matched-correct')) return;
    if (!matchSelected) { document.querySelectorAll('.match-item.selected').forEach(e=>e.classList.remove('selected')); matchSelected={type,id,el}; el.classList.add('selected'); return; }
    if (matchSelected.type===type) { document.querySelectorAll('.match-item.selected').forEach(e=>e.classList.remove('selected')); matchSelected={type,id,el}; el.classList.add('selected'); return; }
    const isMatch=matchSelected.id===id;
    const prev=matchSelected.el;
    if (isMatch) {
        prev.classList.remove('selected'); prev.classList.add('matched-correct'); el.classList.add('matched-correct');
        matchedCount++; document.getElementById('matchCount').textContent=matchedCount; matchSelected=null;
        showToast('✓ Matched!');
        if (matchedCount===MODULE.matching.length) setTimeout(()=>showWin('matching',MODULE.matching.length,MODULE.matching.length),400);
    } else {
        prev.classList.add('matched-wrong'); el.classList.add('matched-wrong');
        setTimeout(()=>{ prev.classList.remove('selected','matched-wrong'); el.classList.remove('selected','matched-wrong'); matchSelected=null; },600);
    }
};

// ══════════════════════════════════════════════════════════
// 4. TRUE / FALSE
// ══════════════════════════════════════════════════════════

function renderTrueFalse(body) {
    const items=MODULE.truefalse;
    if (!items||!items.length) { body.innerHTML='<p style="text-align:center;color:var(--text-muted);padding:2rem;">No T/F questions for this module.</p>'; return; }
    if (tfIndex>=items.length) { showWin('truefalse',tfScore,items.length); return; }
    const item=items[tfIndex];
    body.innerHTML=`
        <div class="score-bar">
            <span class="score">Question ${tfIndex+1} of ${items.length}</span>
            <span class="score">Score: <strong>${tfScore}</strong></span>
        </div>
        <div class="tf-statement"><p>${item.stmt}</p></div>
        <div class="tf-buttons">
            <button class="btn-tf true-btn" onclick="answerTF(true)">✓ True</button>
            <button class="btn-tf false-btn" onclick="answerTF(false)">✗ False</button>
        </div>
        <div class="tf-feedback" id="tfFeedback"></div>`;
}

window.answerTF = function(answer) {
    const item=MODULE.truefalse[tfIndex];
    const correct=answer===item.ans;
    if(correct) tfScore++;
    document.querySelectorAll('.btn-tf').forEach(b=>b.disabled=true);
    const tB=document.querySelector('.true-btn'), fB=document.querySelector('.false-btn');
    if(answer===true)  tB.classList.add(correct?'correct':'incorrect');
    if(answer===false) fB.classList.add(correct?'correct':'incorrect');
    if(item.ans===true  && answer===false) tB.classList.add('correct');
    if(item.ans===false && answer===true)  fB.classList.add('correct');
    const fb=document.getElementById('tfFeedback');
    if(fb){fb.className=`tf-feedback ${correct?'correct':'incorrect'}`;fb.textContent=item.expl;}
    setTimeout(()=>{ tfIndex++; renderTrueFalse(document.getElementById('gameModalBody')); },1800);
};

// ══════════════════════════════════════════════════════════
// 5. FILL IN THE BLANK
// ══════════════════════════════════════════════════════════

function renderFillBlank(body) {
    const items=MODULE.fillinblank;
    if (!items||!items.length) { body.innerHTML='<p style="text-align:center;color:var(--text-muted);padding:2rem;">No fill-in-blank for this module.</p>'; return; }
    if (fitbIndex>=items.length) { showWin('fillinblank',items.length,items.length); return; }
    const item=items[fitbIndex];
    const bank=[...item.wordBank].sort(()=>Math.random()-0.5);
    const display=item.sentence.replace('___',`<span class="fitb-blank" id="blankSlot">___</span>`);
    body.innerHTML=`
        <div class="score-bar">
            <span class="score">Sentence ${fitbIndex+1} of ${items.length}</span>
            <span class="progress-text">${fitbIndex} complete</span>
        </div>
        <div class="fitb-sentence">${display}</div>
        <div class="word-bank">${bank.map(w=>`<div class="word-chip" onclick="selectWord('${w.replace(/'/g,"\\'")}',this)">${w}</div>`).join('')}</div>`;
}

window.selectWord = function(word,el) {
    if(el.classList.contains('correct')) return;
    const item=MODULE.fillinblank[fitbIndex];
    const correct=word===item.answer;
    const blank=document.getElementById('blankSlot');
    if(correct){
        el.classList.add('correct');
        if(blank){blank.textContent=word;blank.style.borderBottomColor='var(--green)';blank.style.color='var(--green)';}
        showToast('✓ Correct!');
        setTimeout(()=>{ fitbIndex++; renderFillBlank(document.getElementById('gameModalBody')); },900);
    } else {
        el.classList.add('incorrect');
        showToast('Not quite — try again');
        setTimeout(()=>el.classList.remove('incorrect'),700);
    }
};

// ══════════════════════════════════════════════════════════
// 6. DRAG & DROP
// ══════════════════════════════════════════════════════════

function renderDragDrop(body) {
    const dnd=MODULE.dragdrop;
    if(!dnd){body.innerHTML='<p style="text-align:center;color:var(--text-muted);padding:2rem;">No drag-and-drop for this module.</p>';return;}
    const items=[...dnd.items].sort(()=>Math.random()-0.5);
    const catKeys=Object.keys(dnd.categories);
    body.innerHTML=`
        <div class="score-bar">
            <span class="score">Drag each item to the right category</span>
            <span id="dndScore" class="progress-text">0/${dnd.items.length} sorted</span>
        </div>
        <div class="dnd-bank" id="dndBank">
            ${items.map(name=>`<div class="dnd-chip" draggable="true" data-name="${name.replace(/"/g,'&quot;')}" ondragstart="dndStart(event)" ondragend="dndEnd(event)">${name}</div>`).join('')}
        </div>
        <div class="dnd-categories cols-${dnd.cols}">
            ${catKeys.map(cat=>`
                <div class="dnd-category" id="cat-${cat.replace(/\s/g,'-')}" ondragover="dndOver(event)" ondragleave="dndLeave(event)" ondrop="dndDrop(event,'${cat.replace(/'/g,"\\'")}')">
                    <div class="dnd-cat-label">${cat}</div>
                </div>`).join('')}
        </div>
        <div style="margin-top:1.5rem;" class="game-btn-row">
            <button class="btn-game outline" onclick="renderDragDrop(document.getElementById('gameModalBody'))">↺ Reset</button>
            <button class="btn-game" id="checkDndBtn" onclick="checkDragDrop()" disabled>Check →</button>
        </div>`;
}

window.dndStart = function(e){ dndDragging=e.target.dataset.name; e.target.classList.add('dragging'); };
window.dndEnd   = function(e){ e.target.classList.remove('dragging'); };
window.dndOver  = function(e){ e.preventDefault(); e.currentTarget.classList.add('drag-over'); };
window.dndLeave = function(e){ e.currentTarget.classList.remove('drag-over'); };

window.dndDrop = function(e,cat) {
    e.preventDefault(); e.currentTarget.classList.remove('drag-over');
    if(!dndDragging) return;
    const bankEl=document.querySelector(`.dnd-bank .dnd-chip[data-name="${dndDragging.replace(/"/g,'&quot;')}"]`);
    if(!bankEl) return;
    bankEl.remove();
    const catKey=cat.replace(/\s/g,'-');
    const catEl=document.getElementById(`cat-${catKey}`);
    if(!catEl) return;
    const chip=document.createElement('div');
    chip.className='dnd-chip'; chip.dataset.name=dndDragging; chip.dataset.cat=cat; chip.textContent=dndDragging;
    chip.onclick=()=>{
        chip.remove();
        const bank=document.getElementById('dndBank');
        const nc=document.createElement('div');
        nc.className='dnd-chip'; nc.draggable=true; nc.dataset.name=chip.dataset.name; nc.textContent=chip.dataset.name;
        nc.ondragstart=window.dndStart; nc.ondragend=window.dndEnd; bank.appendChild(nc);
        updateDndScore();
    };
    catEl.appendChild(chip); dndDragging=null; updateDndScore();
};

function updateDndScore(){
    const placed=document.querySelectorAll('.dnd-category .dnd-chip').length;
    const el=document.getElementById('dndScore');
    if(el) el.textContent=`${placed}/${MODULE.dragdrop.items.length} sorted`;
    const btn=document.getElementById('checkDndBtn');
    if(btn) btn.disabled=placed<MODULE.dragdrop.items.length;
}

window.checkDragDrop = function() {
    const dnd=MODULE.dragdrop; let correct=0;
    Object.entries(dnd.categories).forEach(([cat,correctItems])=>{
        const catKey=cat.replace(/\s/g,'-');
        document.querySelectorAll(`#cat-${catKey} .dnd-chip`).forEach(chip=>{
            const ok=correctItems.includes(chip.dataset.name);
            chip.classList.add(ok?'correct':'incorrect');
            if(ok) correct++;
        });
    });
    setTimeout(()=>{
        if(correct===dnd.items.length) showWin('dragdrop',correct,dnd.items.length);
        else { showToast(`${correct}/${dnd.items.length} correct — red items need to move`); document.getElementById('checkDndBtn').disabled=false; }
    },800);
};

// ══════════════════════════════════════════════════════════
// WIN SCREEN
// ══════════════════════════════════════════════════════════

function showWin(gameId,score,total) {
    const xp=XP_VALUES[gameId]||15;
    const pct=Math.round((score/total)*100);
    const already=completed[gameId];
    document.getElementById('gameModalBody').innerHTML=`
        <div class="win-screen">
            <span class="win-icon">✟</span>
            <h3>${pct>=80?'Well Done!':'Good Effort!'}</h3>
            <p>${score}/${total} complete. Keep studying what you missed.</p>
            ${!already?`<div class="xp-award-badge">⭐ +${xp} XP Earned</div>`:`<p style="color:var(--text-muted);font-size:0.85rem;margin-bottom:1.5rem;">XP already earned for this game.</p>`}
            <div class="game-btn-row">
                <button class="btn-game outline" onclick="openGame('${gameId}')">Play Again</button>
                <button class="btn-game" onclick="window.closeGame()">Back to Games</button>
            </div>
        </div>`;
    if(!already){ completed[gameId]=true; markCardComplete(gameId); awardXP(gameId,xp); }
}

function markCardComplete(gameId){
    document.getElementById(`card-${gameId}`)?.classList.add('completed');
    const s=document.getElementById(`status-${gameId}`);
    if(s){s.textContent='✓ Completed';s.className='game-status done';}
}

async function awardXP(gameId,amount){
    if(!window.currentUser||!window.db) return;
    const {doc,getDoc,setDoc,updateDoc,serverTimestamp}=window.fsOps;
    const uid=window.currentUser.uid;
    try {
        const ref=doc(window.db,'userProgress',uid);
        const snap=await getDoc(ref);
        if(snap.exists()){
            const cur=snap.data().totalXP||0;
            await updateDoc(ref,{totalXP:cur+amount,lastActivity:serverTimestamp()});
            const c=document.getElementById('xpChip');
            if(c){c.textContent=`⭐ ${cur+amount} XP`;c.style.display='inline-flex';}
        } else {
            await setDoc(ref,{totalXP:amount,lastActivity:serverTimestamp(),userId:uid});
            const c=document.getElementById('xpChip');
            if(c){c.textContent=`⭐ ${amount} XP`;c.style.display='inline-flex';}
        }
        showToast(`⭐ +${amount} XP added!`);
    } catch(e){console.error(e);}
}

function showToast(msg){
    const t=document.getElementById('toast');
    t.textContent=msg; t.classList.add('show');
    setTimeout(()=>t.classList.remove('show'),2200);
}
</script>
