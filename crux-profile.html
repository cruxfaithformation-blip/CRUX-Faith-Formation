    <!-- Firebase -->
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getFirestore, doc, getDoc } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

        const app = initializeApp({
            apiKey: "AIzaSyCq2cyJUMIA9pGWz9PZ8VPdw1hi0-iv3cU",
            authDomain: "crux-faith-formation.firebaseapp.com",
            projectId: "crux-faith-formation",
            storageBucket: "crux-faith-formation.firebasestorage.app",
            messagingSenderId: "838141015985",
            appId: "1:838141015985:web:2655e570663e182d75ef90"
        });
        const db = getFirestore(app);

        const uid = new URLSearchParams(location.search).get('uid');
        if (!uid) {
            window.profileError = 'no-uid';
        } else {
            try {
                const snap = await getDoc(doc(db, 'profiles', uid));
                if (snap.exists()) {
                    window.profileData = { uid, ...snap.data() };
                } else {
                    window.profileError = 'not-found';
                }
            } catch (e) {
                console.error(e);
                window.profileError = 'load-failed';
            }
        }
        document.dispatchEvent(new Event('profile-ready'));
    </script>

        :root {

        /* ─── NAV ─────────────────────────────────────────── */
        .profile-nav {

        }
        .nav-back {

        /* ─── CONTAINER ───────────────────────────────────── */

            font-size: 1.5rem;
            font-weight: 700;

            font-weight: 700;
            letter-spacing: 1.5px;

        @media (max-width: 480px) {
            .profile-hero { flex-direction: column; gap: 1rem; }
            .profile-name { font-size: 1.9rem; }
            .profile-avatar { width: 64px; height: 64px; font-size: 1.7rem; }

            .stat-item { border-right: none; border-bottom: 1px solid rgba(212,165,116,0.1); }
            .stat-item:last-child { border-bottom: none; }
        }

            'elizabeth-ann':  { name: 'St. Elizabeth Ann Seton', url: 'crux-elizabeth-ann-flip.html' },
            'charles-lwanga': { name: 'St. Charles Lwanga',      url: 'crux-charles-lwanga-flip.html' },
            'maria-goretti':  { name: 'St. Maria Goretti',       url: 'crux-maria-goretti-flip.html' },
            'dominic-savio':  { name: 'St. Dominic Savio',       url: 'crux-dominic-savio-flip.html' },
            aloysius:         { name: 'St. Aloysius Gonzaga',    url: 'crux-aloysius-flip.html' },
            gemma:            { name: 'St. Gemma Galgani',       url: 'crux-gemma-flip.html' },
            'jose-sanchez':   { name: 'St. José Sánchez del Río',url: 'crux-jose-sanchez-flip.html' },
            'oscar-romero':   { name: 'St. Oscar Romero',        url: 'crux-oscar-romero-flip.html' },
            'miguel-pro':     { name: 'Bl. Miguel Pro',          url: 'crux-miguel-pro-flip.html' },
            francisco:        { name: 'St. Francisco Marto',     url: 'crux-francisco-flip.html' },
            jacinta:          { name: 'St. Jacinta Marto',       url: 'crux-jacinta-flip.html' },
        };

        const LEVEL_NAMES = [
            { level:1, name:'Seeker', min:0 },
            { level:2, name:'Learner', min:100 },
            { level:3, name:'Student', min:300 },
            { level:4, name:'Disciple', min:600 },
            { level:5, name:'Apostle', min:1000 },
            { level:6, name:'Teacher', min:2000 },
            { level:7, name:'Saint', min:4000 }
        ];

        function levelName(n) {
            return (LEVEL_NAMES.find(l => l.level === n) || LEVEL_NAMES[0]).name;
        }

        function formatDate(ts) {
            if (!ts) return '';
            const d = ts.toDate ? ts.toDate() : new Date(ts);
            return d.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
        }

        function cardHtml(id) {
            const meta   = CARD_CATALOG[id];
            const name   = meta ? meta.name : id;
            const url    = meta ? meta.url  : null;
            const imgSrc = 'images/saints/' + id + '.jpg';
            const tag    = url ? 'a' : 'div';
            const href   = url ? ' href="' + url + '"' : '';
            return '<' + tag + href + ' class="fav-card-wrap">' +
                '<img class="fav-card-img" src="' + imgSrc + '" alt="' + name + '" ' +
                    'onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\'">' +
                '<div class="fav-card-fallback" style="display:none"><span>CRUX</span></div>' +
                '<div class="fav-card-label">' + name + '</div>' +
            '</' + tag + '>';
        }

        function renderProfile(data) {
            const container = document.getElementById('profileContainer');
            const initial   = (data.username || '?')[0].toUpperCase();
            const level     = data.level || 1;
            const cards     = data.cardCount || 0;
            const packs     = data.packsOpened || 0;
            const favIds    = data.favoriteCards || [];
            const joined    = formatDate(data.joinedDate);

            const bioHtml = data.bio
                ? '<div class="profile-bio">' + data.bio.replace(/</g,'&lt;') + '</div>'
                : '';

            const verseHtml = data.favoriteVerse
                ? '<div class="profile-verse">' +
                    '<div class="profile-verse-text">&ldquo;' + data.favoriteVerse.replace(/</g,'&lt;') + '&rdquo;</div>' +
                    '<div class="profile-verse-label">Favorite Verse</div>' +
                  '</div>'
                : '';

            const favCardsHtml = favIds.length
                ? favIds.map(cardHtml).join('')
                : '<div class="fav-cards-empty">No favorite cards chosen yet.</div>';

            container.innerHTML =
                '<div class="profile-hero">' +
                    '<div class="profile-avatar">' + initial + '</div>' +
                    '<div class="profile-hero-text">' +
                        '<div class="profile-name">' + (data.username || 'Anonymous') + '</div>' +
                        '<div class="profile-badges">' +
                            '<span class="profile-badge">⚔ Level ' + level + ' — ' + levelName(level) + '</span>' +
                        '</div>' +
                        (joined ? '<div class="profile-joined">Member since ' + joined + '</div>' : '') +
                    '</div>' +
                '</div>' +
                bioHtml +
                verseHtml +
                '<div class="fav-cards-section">' +
                    '<div class="section-eyebrow">✦ Patron Saints</div>' +
                    '<div class="fav-cards-row">' + favCardsHtml + '</div>' +
                '</div>' +
                '<div class="profile-stats">' +
                    '<div class="stat-item"><div class="stat-value">' + cards + '</div><div class="stat-label">Cards</div></div>' +
                    '<div class="stat-item"><div class="stat-value">' + packs + '</div><div class="stat-label">Packs Opened</div></div>' +
                    '<div class="stat-item"><div class="stat-value">' + level + '</div><div class="stat-label">Level</div></div>' +
                '</div>' +
                '<div class="profile-cta">' +
                    '<div class="profile-cta-title">Start your own faith journey</div>' +
                    '<div class="profile-cta-body">Earn XP through Bible study, collect saint cards, and build your confirmation profile on CRUX.</div>' +
                    '<a href="crux-account.html" class="btn-join-crux">Join CRUX →</a>' +
                '</div>';

            // Update page title
            document.title = (data.username || 'Profile') + ' — CRUX';
        }

        function renderError(type) {
            const container = document.getElementById('profileContainer');
            const msgs = {
                'no-uid':      ['No profile specified', 'Check the link you were given and try again.'],
                'not-found':   ['Profile not found', 'This user hasn\'t set up a public profile yet.'],
                'load-failed': ['Couldn\'t load profile', 'Check your connection and try again.']
            };
            const [title, body] = msgs[type] || msgs['load-failed'];
            container.innerHTML =
                '<div class="state-center">' +
                    '<div class="state-icon">✟</div>' +
                    '<div class="state-title">' + title + '</div>' +
                    '<div class="state-body">' + body + '</div>' +
                    '<a href="index.html" class="btn-join-crux">Go to CRUX</a>' +
                '</div>';
        }

        document.addEventListener('profile-ready', function() {
            if (window.profileError) {
                renderError(window.profileError);
            } else if (window.profileData) {
                renderProfile(window.profileData);
            }
        });
    </script>
</body>
</html>
